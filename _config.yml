# ─────────────────────────────────────────────────────────────
# Drawwii 랜딩 사이트 설정
#
# 콘텐츠(기능 목록, 카피, FAQ 등)는 대부분 _data/*.yml 에 있다.
# 앱 릴리스 시 아래 app.version + _data/features.yml 숫자 + _pages/changelog.md
# 를 함께 갱신한다 (source of truth: 앱 저장소 origin/main).
# ─────────────────────────────────────────────────────────────

title       : Drawwii
tagline     : Draw, Edit & Collage
description : >-
  A full drawing studio and an on-device AI photo editor in one free app.
  Pressure-sensitive brushes, layers, background removal, and 290+ templates —
  all running on your phone.
url         : https://drawwii.com
lang        : en

app:
  name           : "Drawwii: Draw, Edit & Collage"
  short_name     : Drawwii
  version        : "26.27.5"       # 앱 pubspec.yaml 과 동기화. JSON-LD softwareVersion
  ios_app_id     : "6751758802"
  appstore_link  : https://apps.apple.com/us/app/id6751758802
  playstore_link : https://play.google.com/store/apps/details?id=kr.co.bullets.drawwii
  ios_min        : "17.0"
  android_min    : "9"
  languages      : [en, ko, ja]
  price          : "0"
  currency       : USD

publisher:
  name  : Bullets
  email : develop@bullets.co.kr

social:
  instagram : drawwii.official
  twitter   : drawwiiofficial
  youtube   : drawwii.official

seo:
  og_image        : /assets/og/drawwii-og-1200x630.png
  og_image_width  : 1200
  og_image_height : 630
  og_image_alt    : "Drawwii — a drawing studio and on-device AI photo editor"
  theme_light     : "#DF64A3"
  theme_dark      : "#5A1F3D"

enable_smart_app_banner: true

# ── Jekyll ───────────────────────────────────────────────────
sass:
  style: compressed

exclude:
  - LICENSE
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - tools/
  # ⚠️ CNAME 은 절대 exclude 하지 않는다 (커스텀 도메인 유지)

collections:
  pages:
    output: true
    permalink: /:path/

markdown: kramdown

plugins:
  - jekyll-sitemap
