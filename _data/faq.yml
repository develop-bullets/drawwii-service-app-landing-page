- q: Is Drawwii free to download?
  a: Yes. You can download Drawwii from the App Store and Google Play at no cost.
- q: Are my photos uploaded to a server?
  a: No. Background removal and the Magic Eraser are processed on your device, so your photos are not uploaded for editing.
- q: Which devices are supported?
  a: iPhone on iOS 17 or later, and Android phones on Android 9 or later.
- q: What formats can I export?
  a: PNG, transparent PNG, JPG, PDF, and SVG, at the resolution you choose. You can also share a timelapse of your drawing.
- q: Can I move my drawings to a new phone?
  a: Yes. Back up your whole gallery to a single .drawwii file, then restore it on the new device.
- q: Can I keep editing a photo after removing its background?
  a: Yes. A cut-out subject becomes a movable, resizable element in the drawing editor, so you can place it on a new background, add it to a collage, or draw around it.
- q: What can I make with the templates?
  a: Drawwii includes 290+ templates across 20+ categories — invitations, planners, checklists, celebrations, business, and more — plus 40+ social size presets for Instagram, YouTube, TikTok, X, and LinkedIn.
- q: What languages does Drawwii support?
  a: English, Korean, and Japanese, switchable in Settings.
