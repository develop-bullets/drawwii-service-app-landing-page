<section class="section section--tight">
  <div class="container">
    <div class="highlights">
      {%- for h in site.data.highlights %}
      <div class="highlight">
        <div class="icon-badge"><svg class="icon" aria-hidden="true"><use href="#{{ h.icon }}"/></svg></div>
        <h3>{{ h.title }}</h3>
        <p>{{ h.text }}</p>
      </div>
      {%- endfor %}
    </div>
  </div>
</section>
