<head>
	<meta charset="utf-8">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<base target="_blank">

	<title class="pageTitle">{% if page.title and page.url != '/' %}{{ page.title }} – {{ site.page_title }}{% else %}{{ site.page_title }}{% endif %}</title>
	<meta name="description" content="{{ site.app_description }}">

	<link rel="shortcut icon" href="{{ site.app_icon | relative_url }}">
	<link rel="canonical" href="{{ page.url | absolute_url }}" />

	<!-- Open Graph / Twitter Card -->
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="{{ site.app_name }}">
	<meta property="og:title" content="{% if page.title and page.url != '/' %}{{ page.title }} – {{ site.page_title }}{% else %}{{ site.page_title }}{% endif %}">
	<meta property="og:description" content="{{ site.app_description }}">
	<meta property="og:url" content="{{ page.url | absolute_url }}">
	{% if site.og_image %}<meta property="og:image" content="{{ site.og_image | absolute_url }}">{% endif %}
	<meta name="twitter:card" content="summary_large_image">
	{% if site.twitter_username %}<meta name="twitter:site" content="@{{ site.twitter_username }}">{% endif %}

	<!-- Smart App Banner -->
	{% if site.enable_smart_app_banner %}
		<meta name="apple-itunes-app" content="app-id={{ site.ios_app_id }}">
	{% endif %}

	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" integrity="sha384-UHRtZLI+pbxtHCWp1t77Bi1L4ZtiqrqD80Kn4Z8NTSRyMA2Fd33n5dQ8lWUE00s/" crossorigin="anonymous">
	<link rel="stylesheet" href="{{ '/main.css' | relative_url }}">

	<!-- jQuery (loaded once here; used by appstoreimages.html and screencontent.html) -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
